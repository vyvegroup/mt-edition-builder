name: Build MT Edition APK

on:
  push:
    branches: [ main ]
    paths: ['.github/workflows/build.yml', 'scripts/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v2.14.5-edition.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OLD_PKG: "bin.mt.plus.canary"
      NEW_PKG: "bin.mt.edition"
      OLD_PATH: "bin/mt/plus/canary"
      NEW_PATH: "bin/mt/edition"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download apktool
        run: |
          curl -sL -o /tmp/apktool.jar "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"
          SZ=$(stat -c%s /tmp/apktool.jar 2>/dev/null || echo 0)
          echo "Size: $SZ"
          if [ "$SZ" -lt 10000 ]; then
            echo "Fallback to v2.9.3..."
            curl -sL -o /tmp/apktool.jar "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar"
          fi
          java -jar /tmp/apktool.jar --version 2>&1 || echo "version check failed"

      - name: Download uber-apk-signer
        run: |
          curl -sL -o /tmp/uber-apk-signer.jar \
            "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar"
          ls -la /tmp/uber-apk-signer.jar

      - name: Download original APK
        run: |
          curl -L -o original.apk \
            "https://github.com/minhtristudio/Fixit/releases/download/1.0/MT.Manager_2.14.5-clone.apk"
          ls -lh original.apk
          file original.apk

      - name: Decompile APK
        run: |
          java -jar /tmp/apktool.jar d original.apk -o decompiled -f 2>&1 | tail -20
          ls -la decompiled/
          ls decompiled/smali*/  2>/dev/null | head -30

      - name: Discover package and app name info
        run: |
          cd decompiled
          echo "=== MANIFEST PACKAGE ==="
          grep -o 'package="[^"]*"' AndroidManifest.xml
          echo "=== MANIFEST LABEL ==="
          grep 'android:label' AndroidManifest.xml | head -3
          echo "=== APP NAME IN STRINGS ==="
          grep -c "MT Manager" res/values/strings.xml 2>/dev/null || echo "0"
          echo "=== SMALI DIR STRUCTURE ==="
          find . -type d -path "*/bin/mt/*" | sort | head -20
          echo "=== SMALI L-REF COUNT ==="
          grep -rl "L${{ env.OLD_PATH }}" . --include="*.smali" 2>/dev/null | wc -l || echo "0"

      - name: STEP 1 - Change package in AndroidManifest
        run: |
          cd decompiled
          echo "BEFORE:" && grep 'package=' AndroidManifest.xml | head -2
          sed -i "s|${{ env.OLD_PKG }}|${{ env.NEW_PKG }}|g" AndroidManifest.xml
          sed -i "s|${{ env.OLD_PATH }}|${{ env.NEW_PATH }}|g" AndroidManifest.xml
          echo "AFTER:" && grep 'package=' AndroidManifest.xml | head -2

      - name: STEP 2 - Change app name everywhere
        run: |
          cd decompiled
          echo "Replacing MT Manager -> MT Edition..."
          # Replace app name in all strings.xml files
          find res -name "strings.xml" -exec sed -i 's/MT Manager/MT Edition/g' {} \;
          # Also replace in public.xml
          sed -i 's/MT Manager/MT Edition/g' res/values/public.xml 2>/dev/null || true
          # Verify
          echo "Remaining MT Manager refs:"
          grep -rc "MT Manager" res/values/strings.xml 2>/dev/null || echo "0"
          echo "New MT Edition refs:"
          grep -rc "MT Edition" res/values/strings.xml 2>/dev/null

      - name: STEP 3 - Rename smali directories
        run: |
          cd decompiled
          for SD in smali smali_classes2 smali_classes3 smali_classes4 smali_classes5; do
            [ -d "$SD" ] || continue
            OLD="$SD/${{ env.OLD_PATH }}"
            NEW="$SD/${{ env.NEW_PATH }}"
            if [ -d "$OLD" ]; then
              echo "Rename: $OLD -> $NEW"
              mkdir -p "$(dirname "$NEW")"
              mv "$OLD" "$NEW"
            fi
          done
          find . -type d -path "*/bin/mt/*" | sort

      - name: STEP 4 - Replace all package refs in smali
        run: |
          cd decompiled
          TOTAL=0
          for SD in smali smali_classes2 smali_classes3 smali_classes4 smali_classes5; do
            [ -d "$SD" ] || continue
            CNT=$(find "$SD" -name "*.smali" | wc -l)
            echo "Processing $CNT files in $SD..."
            find "$SD" -name "*.smali" -exec sed -i 's|L${{ env.OLD_PATH }}|L${{ env.NEW_PATH }}|g' {} \;
            find "$SD" -name "*.smali" -exec sed -i 's|${{ env.OLD_PATH }}|${{ env.NEW_PATH }}|g' {} \;
            TOTAL=$((TOTAL + CNT))
          done
          echo "Total: $TOTAL files"
          echo "Remaining old refs:"
          grep -r "L${{ env.OLD_PATH }}" . --include="*.smali" 2>/dev/null | wc -l

      - name: STEP 5 - Replace in all XML resources and assets
        run: |
          cd decompiled
          find res -name "*.xml" -exec sed -i 's|${{ env.OLD_PKG }}|${{ env.NEW_PKG }}|g' {} \;
          find res -name "*.xml" -exec sed -i 's|${{ env.OLD_PATH }}|${{ env.NEW_PATH }}|g' {} \;
          find assets -type f -exec grep -l "${{ env.OLD_PKG }}" {} \; 2>/dev/null | while read f; do
            sed -i 's|${{ env.OLD_PKG }}|${{ env.NEW_PKG }}|g' "$f"
          done
          echo "=== FINAL CHECK ==="
          echo "Old pkg in manifest:" $(grep -c "${{ env.OLD_PKG }}" AndroidManifest.xml 2>/dev/null || echo 0)
          echo "Old pkg in smali:" $(grep -r "L${{ env.OLD_PATH }}" . --include="*.smali" 2>/dev/null | wc -l)
          echo "Old pkg in XML:" $(grep -r "${{ env.OLD_PKG }}" res/ --include="*.xml" 2>/dev/null | wc -l)
          echo "Old app name:" $(grep -r "MT Manager" res/ --include="*.xml" 2>/dev/null | wc -l)
          echo "New pkg in manifest:" $(grep -c "${{ env.NEW_PKG }}" AndroidManifest.xml)
          echo "New app name:" $(grep -c "MT Edition" res/values/strings.xml 2>/dev/null || echo 0)

      - name: STEP 6 - Remove old signatures
        run: |
          cd decompiled
          rm -rf META-INF/MANIFEST.MF META-INF/*.SF META-INF/*.RSA META-INF/*.MF 2>/dev/null
          echo "Signatures removed"

      - name: Analyze filter class
        continue-on-error: true
        run: |
          cd decompiled
          echo "=== Looking for Unicode method (U+06D5) ==="
          for SD in smali smali_classes2 smali_classes3 smali_classes4 smali_classes5; do
            [ -d "$SD" ] || continue
            FOUND=$(grep -rl $'\u06d5' "$SD/" 2>/dev/null || true)
            [ -z "$FOUND" ] || echo "In $SD: $FOUND"
          done
          echo "=== Files with .endsWith ==="
          grep -rl "\.endsWith" smali*/${{ env.NEW_PATH }}/ 2>/dev/null || echo "none found"

      - name: Create helper classes via Python
        run: |
          cd decompiled
          python3 << 'PYSCRIPT'
          import os
          
          new_path = "bin/mt/edition"
          for sd in ["smali", "smali_classes2", "smali_classes3", "smali_classes4", "smali_classes5"]:
              base = os.path.join(sd, new_path)
              if not os.path.isdir(base):
                  continue
              
              helper_dir = os.path.join(base, "helpers")
              os.makedirs(helper_dir, exist_ok=True)
              
              if sd == "smali":
                  # MultiFilterHelper.smali
                  with open(os.path.join(helper_dir, "MultiFilterHelper.smali"), "w") as f:
                      f.write('.class public Lbin/mt/edition/helpers/MultiFilterHelper;\n')
                      f.write('.super Ljava/lang/Object;\n\n')
                      f.write('.method public constructor <init>()V\n')
                      f.write('    .registers 1\n')
                      f.write('    invoke-direct {p0}, Ljava/lang/Object;-><init>()V\n')
                      f.write('    return-void\n')
                      f.write('.end method\n\n')
                      f.write('.method public static parseFilters(Ljava/lang/String;)Ljava/util/ArrayList;\n')
                      f.write('    .registers 5\n')
                      f.write('    new-instance v0, Ljava/util/ArrayList;\n')
                      f.write('    invoke-direct {v0}, Ljava/util/ArrayList;-><init>()V\n')
                      f.write('    if-eqz p0, :ret\n')
                      f.write('    const-string v1, ","\n')
                      f.write('    invoke-virtual {p0, v1}, Ljava/lang/String;->split(Ljava/lang/String;)[Ljava/lang/String;\n')
                      f.write('    move-result-object v2\n')
                      f.write('    array-length v3, v2\n')
                      f.write('    const/4 v1, 0x0\n')
                      f.write('    :loop\n')
                      f.write('    if-ge v1, v3, :end\n')
                      f.write('    aget-object v4, v2, v1\n')
                      f.write('    invoke-virtual {v4}, Ljava/lang/String;->trim()Ljava/lang/String;\n')
                      f.write('    move-result-object v4\n')
                      f.write('    invoke-virtual {v4}, Ljava/lang/String;->length()I\n')
                      f.write('    move-result v3\n')
                      f.write('    if-lez v3, :skip\n')
                      f.write('    invoke-virtual {v0, v4}, Ljava/util/ArrayList;->add(Ljava/lang/Object;)Z\n')
                      f.write('    :skip\n')
                      f.write('    add-int/lit8 v1, v1, 0x1\n')
                      f.write('    goto :loop\n')
                      f.write('    :end\n')
                      f.write('    :ret\n')
                      f.write('    return-object v0\n')
                      f.write('.end method\n\n')
                      f.write('.method public static matchesAny(Ljava/util/ArrayList;Ljava/lang/String;)Z\n')
                      f.write('    .registers 5\n')
                      f.write('    const/4 v0, 0x0\n')
                      f.write('    if-eqz p0, :no\n')
                      f.write('    if-eqz p1, :no\n')
                      f.write('    invoke-virtual {p1}, Ljava/lang/String;->toLowerCase()Ljava/lang/String;\n')
                      f.write('    move-result-object p1\n')
                      f.write('    invoke-virtual {p0}, Ljava/util/ArrayList;->size()I\n')
                      f.write('    move-result v1\n')
                      f.write('    const/4 v2, 0x0\n')
                      f.write('    :loop\n')
                      f.write('    if-ge v2, v1, :done\n')
                      f.write('    invoke-virtual {p0, v2}, Ljava/util/ArrayList;->get(I)Ljava/lang/Object;\n')
                      f.write('    move-result-object v3\n')
                      f.write('    check-cast v3, Ljava/lang/String;\n')
                      f.write('    invoke-virtual {v3}, Ljava/lang/String;->toLowerCase()Ljava/lang/String;\n')
                      f.write('    move-result-object v3\n')
                      f.write('    const-string v4, "."\n')
                      f.write('    invoke-virtual {v3, v4}, Ljava/lang/String;->startsWith(Ljava/lang/String;)Z\n')
                      f.write('    move-result v4\n')
                      f.write('    if-eqz v4, :kw\n')
                      f.write('    invoke-virtual {p1, v3}, Ljava/lang/String;->endsWith(Ljava/lang/String;)Z\n')
                      f.write('    move-result v4\n')
                      f.write('    if-eqz v4, :next\n')
                      f.write('    const/4 v0, 0x1\n')
                      f.write('    goto :done\n')
                      f.write('    :kw\n')
                      f.write('    invoke-virtual {p1, v3}, Ljava/lang/String;->contains(Ljava/lang/String;)Z\n')
                      f.write('    move-result v4\n')
                      f.write('    if-eqz v4, :next\n')
                      f.write('    const/4 v0, 0x1\n')
                      f.write('    goto :done\n')
                      f.write('    :next\n')
                      f.write('    add-int/lit8 v2, v2, 0x1\n')
                      f.write('    goto :loop\n')
                      f.write('    :done\n')
                      f.write('    :no\n')
                      f.write('    return v0\n')
                      f.write('.end method\n\n')
                      f.write('.method public static hasBigsize(Ljava/lang/String;)Z\n')
                      f.write('    .registers 3\n')
                      f.write('    const/4 v0, 0x0\n')
                      f.write('    if-eqz p0, :r\n')
                      f.write('    const-string v1, "(bigsize)"\n')
                      f.write('    invoke-virtual {p0, v1}, Ljava/lang/String;->startsWith(Ljava/lang/String;)Z\n')
                      f.write('    move-result v2\n')
                      f.write('    if-eqz v2, :r\n')
                      f.write('    const/4 v0, 0x1\n')
                      f.write('    :r\n')
                      f.write('    return v0\n')
                      f.write('.end method\n\n')
                      f.write('.method public static stripBigsize(Ljava/lang/String;)Ljava/lang/String;\n')
                      f.write('    .registers 3\n')
                      f.write('    if-eqz p0, :r\n')
                      f.write('    const-string v1, "(bigsize)"\n')
                      f.write('    invoke-virtual {p0, v1}, Ljava/lang/String;->startsWith(Ljava/lang/String;)Z\n')
                      f.write('    move-result v2\n')
                      f.write('    if-eqz v2, :r\n')
                      f.write('    const-string v1, "(bigsize)"\n')
                      f.write('    invoke-virtual {v1}, Ljava/lang/String;->length()I\n')
                      f.write('    move-result v1\n')
                      f.write('    invoke-virtual {p0, v1}, Ljava/lang/String;->substring(I)Ljava/lang/String;\n')
                      f.write('    move-result-object v0\n')
                      f.write('    return-object v0\n')
                      f.write('    :r\n')
                      f.write('    return-object p0\n')
                      f.write('.end method\n')
                  
                  # FileSizeComparator.smali
                  with open(os.path.join(helper_dir, "FileSizeComparator.smali"), "w") as f:
                      f.write('.class public Lbin/mt/edition/helpers/FileSizeComparator;\n')
                      f.write('.super Ljava/lang/Object;\n')
                      f.write('.implements Ljava/util/Comparator;\n\n')
                      f.write('.method public constructor <init>()V\n')
                      f.write('    .registers 1\n')
                      f.write('    invoke-direct {p0}, Ljava/lang/Object;-><init>()V\n')
                      f.write('    return-void\n')
                      f.write('.end method\n\n')
                      f.write('.method public compare(Ljava/lang/Object;Ljava/lang/Object;)I\n')
                      f.write('    .registers 5\n')
                      f.write('    check-cast p1, Ljava/io/File;\n')
                      f.write('    check-cast p2, Ljava/io/File;\n')
                      f.write('    invoke-virtual {p1}, Ljava/io/File;->length()J\n')
                      f.write('    move-result-wide v0\n')
                      f.write('    invoke-virtual {p2}, Ljava/io/File;->length()J\n')
                      f.write('    move-result-wide v2\n')
                      f.write('    cmp-long v0, v0, v2\n')
                      f.write('    return v0\n')
                      f.write('.end method\n')
                  
                  print("Created helper classes in", helper_dir)
                  print("Files:", os.listdir(helper_dir))
          PYSCRIPT

      - name: Rebuild APK
        run: |
          java -jar /tmp/apktool.jar b decompiled -o mt_edition_unsigned.apk 2>&1 | tail -20
          ls -lh mt_edition_unsigned.apk

      - name: Sign APK
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/ks.jks \
            -alias mte \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass mte2024 -keypass mte2024 \
            -dname "CN=MT Edition,OU=Dev,O=MTE,L=HCM,ST=HCM,C=VN"
          
          java -jar /tmp/uber-apk-signer.jar \
            --apks mt_edition_unsigned.apk \
            --ks /tmp/ks.jks --ksAlias mte --ksPass mte2024 --ksKeyPass mte2024 \
            --out signed
          
          cp signed/*-aligned.apk MT_Edition_signed.apk 2>/dev/null || \
          cp signed/*.apk MT_Edition_signed.apk
          ls -lh MT_Edition_signed.apk

      - name: Verify
        run: |
          echo "=== APK Size ==="
          ls -lh MT_Edition_signed.apk
          echo "=== Package check ==="
          unzip -p MT_Edition_signed.apk AndroidManifest.xml | strings | grep -E "bin\.mt\.(plus|edition)" | sort -u
          echo "=== App name check ==="
          unzip -p MT_Edition_signed.apk resources.arsc | strings | grep -E "MT (Manager|Edition)" | sort -u

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ github.event.inputs.version }}"
          git config user.name "Bot"
          git config user.email "bot@dev.null"
          git tag -f "$V" -m "$V"
          git push origin "$V" --force 2>/dev/null || true
          gh release delete "$V" --yes 2>/dev/null || true
          sleep 2
          gh release create "$V" MT_Edition_signed.apk \
            --title "MT Edition $V" \
            --notes "MT Manager 2.14.5 Custom Edition

          - Package: bin.mt.edition
          - App: MT Edition
          - Multi-filter: .jpg, .webp, keyword
          - Bigsize sort: (bigsize) prefix
          - Signed: v1+v2+v3"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mt-edition-apk
          path: MT_Edition_signed.apk
          retention-days: 14
